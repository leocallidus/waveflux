<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#009688;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" stroke="#00BCD4" stroke-width="2"/>
  <!-- Waveform bars -->
  <g fill="url(#waveGrad)">
    <rect x="20" y="52" width="4" height="24" rx="2"/>
    <rect x="28" y="40" width="4" height="48" rx="2"/>
    <rect x="36" y="32" width="4" height="64" rx="2"/>
    <rect x="44" y="44" width="4" height="40" rx="2"/>
    <rect x="52" y="28" width="4" height="72" rx="2"/>
    <rect x="60" y="36" width="4" height="56" rx="2"/>
    <rect x="68" y="24" width="4" height="80" rx="2"/>
    <rect x="76" y="38" width="4" height="52" rx="2"/>
    <rect x="84" y="30" width="4" height="68" rx="2"/>
    <rect x="92" y="42" width="4" height="44" rx="2"/>
    <rect x="100" y="48" width="4" height="32" rx="2"/>
  </g>
  <!-- Play indicator -->
  <polygon points="54,48 54,80 78,64" fill="#FFFFFF" opacity="0.9"/>
</svg>
